<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chat con Gemini (Flash Preview)</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="chat-container">
      <h1>Chat con Gemini</h1>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="chatForm" class="chat-form">
        <input id="messageInput" type="text" placeholder="Escribe un mensaje..." autocomplete="off" />
        <button type="submit">Enviar</button>
      </form>
      <p class="note">Backend: <code>/chat</code> — env: <code>GOOGLE_API_KEY</code></p>
    </main>

    <script src="/script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con FastAPI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .response {
            margin-top: 20px;
            padding: 10px;
            background-color: #e7f3e7;
            border-left: 5px solid #4CAF50;
            display: none;
        }
        .error {
            background-color: #f8d7da;
            border-left-color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chat con Gemini</h1>
        <div class="input-group">
            <input type="text" id="messageInput" placeholder="Escribe tu mensaje aquí..." />
            <button id="sendButton">Enviar</button>
        </div>
        <div id="responseDiv" class="response"></div>
    </div>

    <script>
        document.getElementById('sendButton').addEventListener('click', async function() {
            const message = document.getElementById('messageInput').value.trim();
            if (!message) {
                alert('Por favor, escribe un mensaje.');
                return;
            }

            const responseDiv = document.getElementById('responseDiv');
            responseDiv.style.display = 'none';
            responseDiv.classList.remove('error');

            try {
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ texto: message })
                });

                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }

                const data = await response.json();
                responseDiv.textContent = data.respuesta || 'Respuesta vacía';
                responseDiv.style.display = 'block';
            } catch (error) {
                responseDiv.textContent = `Error al enviar el mensaje: ${error.message}`;
                responseDiv.classList.add('error');
                responseDiv.style.display = 'block';
            }

            // Limpiar el input
            document.getElementById('messageInput').value = '';
        });

        // Permitir enviar con Enter
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('sendButton').click();
            }
        });
    </script>
</body>
</html>
